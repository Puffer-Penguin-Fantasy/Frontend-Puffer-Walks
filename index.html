<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puffer Walks</title>
  <meta name="google-site-verification" content="mJYhur-JXZvg2RdeY2OivGpkTMujLujrY2NzmAO123k" />
  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- DNS and Connection Pre-warming -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://firestore.googleapis.com" />
  <link rel="preconnect" href="https://mainnet.movementnetwork.xyz" />
  <link rel="preconnect" href="https://gateway.pinata.cloud" />
  <link rel="preconnect" href="https://api.pinata.cloud" />

  <!-- Asset Pre-loading -->
  <link rel="preload" as="image" href="/src/assets/blue.jpg" />
  <link rel="preload" as="font" href="/Xirod.otf" type="font/otf" crossorigin />

  <style>
    body { background-color: #0a0a0a; margin: 0; overflow: hidden; }
    #initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      background-color: #0a0a0a;
      transition: opacity 0.5s ease-out;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <div id="initial-loader">
    <div class="spinner"></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Remove loader once app is mounted
    const observer = new MutationObserver((mutations) => {
      if (document.getElementById('root').children.length > 0) {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 500);
        }
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
  </script>
</body>

</html>
